name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tools-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/probe/go.mod

      - name: Build
        working-directory: apps/probe
        run: go build ./...

      - name: Test
        working-directory: apps/probe
        run: go test ./...
